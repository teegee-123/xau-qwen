services:
  - type: web
    name: xau-copy-trade
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: cd backend && npm install && npm run build && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: NODE_OPTIONS
        value: --max-old-space-size=256
    healthCheckPath: /api/health
    autoDeploy: true
